<style>
  html, body {
    margin: 0; padding: 0;
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #e9e7e2;
    -webkit-font-smoothing: antialiased;
    color: #1a1a1a;
  }
  .num { font-family: 'DM Sans', -apple-system, system-ui, sans-serif; font-feature-settings: 'tnum'; }
  /* iOS scroll inside frame */
  .frame-scroll { -webkit-overflow-scrolling: touch; }
  .frame-scroll::-webkit-scrollbar { display: none; }

  /* shimmer / dots */
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .dot { animation: dotPulse 1.4s infinite both; display: inline-block; }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.32s ease-out both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(16px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .slide-in { animation: slideIn 0.28s ease-out both; }

  @keyframes pulseRing {
    0% { transform: scale(0.6); opacity: 0.6; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .pulse-ring { animation: pulseRing 1.8s ease-out infinite; }

  /* page transition */
  .page-enter { animation: pageEnter 0.32s cubic-bezier(0.32, 0.72, 0.2, 1) both; }
  @keyframes pageEnter {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }

  /* toast */
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px) translateX(-50%); }
    to { opacity: 1; transform: translateY(0) translateX(-50%); }
  }
  .toast { animation: toastIn 0.2s ease-out both; }

  /* scale wrapper to fit viewport */
  .stage { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; }
</style>
