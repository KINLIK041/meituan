# ─── Production deployment ─────────────────────────────────
# Usage:
#   1. cp .env.production .env   (fill in your real API keys)
#   2. docker compose -f docker-compose.prod.yml up -d --build
#   3. Visit http://<your-server-ip>
# ───────────────────────────────────────────────────────────

services:
  nginx:
    image: nginx:alpine
    container_name: route-nginx
    ports:
      - "80:80"
    volumes:
      - ./routeplan:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      route-planner:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  route-planner:
    build: .
    container_name: ai-route-planner
    expose:
      - "8081"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-mock}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - GAODE_API_KEY=${GAODE_API_KEY}
      - MEITUAN_API_TOKEN=${MEITUAN_API_TOKEN}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/liquidroute
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-liquidroute}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-liquidroute}
      - JAVA_TOOL_OPTIONS=-Xmx384m -Xms128m -XX:+UseG1GC -XX:MaxMetaspaceSize=128m
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/route/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: liquidroute-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liquidroute}
      POSTGRES_USER: ${POSTGRES_USER:-liquidroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquidroute}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: |
      -c shared_buffers=128MB
      -c effective_cache_size=384MB
      -c max_connections=15
      -c log_statement=ddl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liquidroute} -d ${POSTGRES_DB:-liquidroute}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
