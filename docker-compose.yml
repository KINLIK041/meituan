version: '3.8'

services:
  route-planner:
    build: .
    container_name: ai-route-planner
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=mock
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-demo-key}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/liquidroute
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-liquidroute}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-liquidroute}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/route/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:16
    container_name: liquidroute-postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-liquidroute}
      POSTGRES_USER: ${POSTGRES_USER:-liquidroute}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liquidroute}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liquidroute} -d ${POSTGRES_DB:-liquidroute}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Optional Redis for session persistence (future)
  redis:
    image: redis:7-alpine
    container_name: route-redis
    ports:
      - "6379:6379"
    profiles:
      - with-redis

volumes:
  postgres_data:
