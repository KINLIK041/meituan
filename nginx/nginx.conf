# ── Rate limiting zones ──────────────────────────────────────────
# Per-IP rate limit: 30 req/s burst 50 for API; 10 req/s burst 20 for auth
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
# Connection limit: max 20 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=30s;

    # Request body size limit (prevents large-payload DoS)
    client_max_body_size 10m;

    # gzip compression for JSX/JS/CSS files
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers (applied to all responses) ───────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # API proxy to backend — use variable so nginx resolves at runtime
    location /api/ {
        # Per-IP connection limit
        limit_conn conn_limit 20;
        # Rate limit (burst allows short spikes)
        limit_req zone=api_limit burst=50 nodelay;
        # Stricter rate limit for auth endpoints
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;
            set $backend "route-planner:8081";
            proxy_pass http://$backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        set $backend "route-planner:8081";
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback — all non-file routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache images (2 weeks — rarely change)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 14d;
        add_header Cache-Control "public";
    }
    # JS/CSS: short cache, allow revalidation (frontend updates frequently)
    location ~* \.(js|css)$ {
        expires 300s;
        add_header Cache-Control "public, must-revalidate";
    }
    # HTML/JSX: never cache (SPA entry point + app logic)
    location ~* \.(html|jsx)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
